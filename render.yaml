# Render Blueprint — API NestJS
# https://render.com/docs/blueprint-spec
# Configurar en el panel de Render: DATABASE_URL, API_KEY, CORS_ORIGIN
services:
  - type: web
    name: portfolio-api
    runtime: node
    rootDir: backend
    buildCommand: npm ci && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /api/devices?limit=1
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_SSL
        value: true
      - key: CORS_ALLOW_VERCEL
        value: true
