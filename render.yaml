# Render Blueprint — API NestJS
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: portfolio-api
    runtime: node
    rootDir: backend
    buildCommand: npm ci --ignore-scripts && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /api/devices?limit=1
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_SSL
        value: true
