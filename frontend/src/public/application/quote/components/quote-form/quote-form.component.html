<div class="card space-y-6">
  <div class="flex items-center gap-3 pb-4 border-b border-gray-100 dark:border-gray-700">
    <div class="w-9 h-9 rounded-xl bg-primary/10 dark:bg-accent/10 flex items-center justify-center">
      <svg class="w-5 h-5 text-primary dark:text-accent" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
      </svg>
    </div>
    <div>
      <h3 class="font-bold text-gray-900 dark:text-white">Datos de la Cotización</h3>
      @if (quoteNumber$ | async; as num) {
        <p class="text-xs text-gray-400 dark:text-gray-500 font-mono">{{ num }} · {{ quoteDate$ | async }}</p>
      }
    </div>
  </div>

  <form [formGroup]="form" class="space-y-5" novalidate>

    <!-- Cliente -->
    <fieldset>
      <legend class="text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-3">
        Datos del Cliente
      </legend>
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
        <div>
          <label class="block text-xs font-medium text-gray-700 dark:text-gray-300 mb-1">
            Nombre <span class="text-red-500">*</span>
          </label>
          <input formControlName="clientName" type="text" placeholder="Juan Pérez"
            class="input-field" />
        </div>
        <div>
          <label class="block text-xs font-medium text-gray-700 dark:text-gray-300 mb-1">Email</label>
          <input formControlName="clientEmail" type="email" placeholder="cliente@empresa.com"
            class="input-field" />
        </div>
        <div class="sm:col-span-2">
          <label class="block text-xs font-medium text-gray-700 dark:text-gray-300 mb-1">Empresa</label>
          <input formControlName="clientCompany" type="text" placeholder="Nombre de la empresa"
            class="input-field" />
        </div>
      </div>
    </fieldset>

    <!-- Configuración -->
    <fieldset>
      <legend class="text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-3">
        Configuración
      </legend>
      <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
        <div>
          <label class="block text-xs font-medium text-gray-700 dark:text-gray-300 mb-1">Válida hasta</label>
          <input formControlName="validUntil" type="date" class="input-field" />
        </div>
        <div>
          <label class="block text-xs font-medium text-gray-700 dark:text-gray-300 mb-1">Moneda</label>
          <select formControlName="currency" class="input-field">
            <option value="USD">USD — Dólar</option>
            <option value="EUR">EUR — Euro</option>
            <option value="VES">VES — Bolívar</option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-medium text-gray-700 dark:text-gray-300 mb-1">
            IVA (%)
          </label>
          <input formControlName="taxRate" type="number" min="0" max="100" placeholder="16"
            class="input-field" />
        </div>
      </div>
    </fieldset>
  </form>
</div>
