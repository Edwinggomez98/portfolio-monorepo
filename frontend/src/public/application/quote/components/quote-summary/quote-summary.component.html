<div class="flex flex-col gap-5">

  <!-- Totales -->
  <div class="card space-y-3">
    <div class="flex items-center gap-3 pb-4 border-b border-gray-100 dark:border-gray-700">
      <div class="w-9 h-9 rounded-xl bg-green-100 dark:bg-green-900/20 flex items-center justify-center">
        <svg class="w-5 h-5 text-green-600 dark:text-green-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 11h.01M12 11h.01M15 11h.01M4 19h16a2 2 0 002-2V7a2 2 0 00-2-2H4a2 2 0 00-2 2v10a2 2 0 002 2z"/>
        </svg>
      </div>
      <h3 class="font-bold text-gray-900 dark:text-white">Resumen</h3>
    </div>

    @if (currency$ | async; as cur) {
      <div class="space-y-2">
        <div class="flex justify-between text-sm">
          <span class="text-gray-500 dark:text-gray-400">Subtotal</span>
          <span class="font-mono font-medium text-gray-800 dark:text-gray-200">
            {{ cur }} {{ (subtotal$ | async) | number:'1.2-2' }}
          </span>
        </div>
        <div class="flex justify-between text-sm">
          <span class="text-gray-500 dark:text-gray-400">
            IVA ({{ taxRate$ | async }}%)
          </span>
          <span class="font-mono font-medium text-gray-800 dark:text-gray-200">
            {{ cur }} {{ (tax$ | async) | number:'1.2-2' }}
          </span>
        </div>
        <div class="flex justify-between pt-3 border-t border-gray-200 dark:border-gray-700">
          <span class="font-bold text-gray-900 dark:text-white">Total</span>
          <span class="font-mono font-black text-xl text-primary dark:text-accent">
            {{ cur }} {{ (total$ | async) | number:'1.2-2' }}
          </span>
        </div>
      </div>
    }
  </div>

  <!-- Notas -->
  <div class="card space-y-3">
    <h3 class="text-sm font-semibold text-gray-700 dark:text-gray-300">Notas / Condiciones</h3>
    <textarea
      [formControl]="notesControl"
      rows="4"
      placeholder="Condiciones de pago, términos, observaciones..."
      class="input-field resize-none text-sm">
    </textarea>
  </div>

  <!-- Acciones -->
  <div class="flex flex-col gap-2">
    <button
      (click)="downloadPdf()"
      [disabled]="!(hasItems$ | async) || (isGenerating$ | async)"
      class="w-full flex items-center justify-center gap-2 px-5 py-3
             bg-primary dark:bg-crimson text-white font-bold rounded-xl
             hover:bg-primary-dark dark:hover:bg-crimson-dark
             transition-all duration-200 shadow-md hover:shadow-lg
             disabled:opacity-50 disabled:cursor-not-allowed disabled:shadow-none">
      @if (isGenerating$ | async) {
        <svg class="animate-spin h-5 w-5" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
        </svg>
        Generando PDF...
      } @else {
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
        </svg>
        Descargar PDF
      }
    </button>

    <button
      (click)="reset()"
      class="w-full flex items-center justify-center gap-2 px-5 py-2.5
             border border-gray-200 dark:border-gray-700
             text-gray-500 dark:text-gray-400 text-sm font-medium rounded-xl
             hover:border-red-300 hover:text-red-500 dark:hover:border-red-800 dark:hover:text-red-400
             transition-colors duration-200">
      <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
      </svg>
      Nueva cotización
    </button>
  </div>

  <!-- Badge NgRx -->
  <div class="flex items-center justify-center gap-2 px-3 py-2 rounded-xl
              bg-gray-50 dark:bg-darkbg-surface border border-gray-100 dark:border-gray-700">
    <svg class="w-4 h-4 text-purple-500" fill="currentColor" viewBox="0 0 24 24">
      <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
    </svg>
    <span class="text-xs text-gray-400 dark:text-gray-500">
      Estado gestionado con <span class="font-semibold text-purple-500">NgRx Store</span>
    </span>
  </div>
</div>
